<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | ImpactAILabs</title>
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative;">

  <!-- Background Glows -->
  <div class="pulse-glow pulse-glow-1"></div>
  <div class="pulse-glow pulse-glow-2"></div>

  <div class="container" style="max-width: 450px;">
    <div class="glass-panel card fade-in" style="padding: 40px;">
      
      <!-- Brand Logo -->
      <div style="text-align: center; margin-bottom: 30px;">
        <a href="index.html" style="font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          <i class="fa-solid fa-brain"></i> ImpactAILabs
        </a>
        <h2 style="font-size: 1.5rem; margin-top: 12px; font-weight: 600;">Admin Console Login</h2>
        <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 6px;">Sign in to view leads and registrations.</p>
      </div>

      <!-- Error Alert -->
      <div id="errorAlert" class="glass-panel" style="display: none; padding: 12px; border-color: rgba(239, 68, 68, 0.4); background: rgba(239, 68, 68, 0.05); color: #F87171; font-size: 0.85rem; margin-bottom: 24px;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-control" required placeholder="Enter username" autocomplete="username">
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required placeholder="Enter password" autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1rem; margin-bottom: 16px;">Log In</button>
      </form>

      <div style="text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-top: 16px;">
        Need to register a new admin? <a href="signup.html" style="color: var(--accent-blue); font-weight: 500; text-decoration: underline;">Create account</a>
      </div>

      <div style="text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-top: 20px;">
        <a href="index.html" style="color: var(--text-muted);"><i class="fa-solid fa-arrow-left"></i> Back to Homepage</a>
      </div>

    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
