<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Lead Dashboard | ImpactAILabs</title>
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">

  <!-- Header Navigation -->
  <header class="navbar-header scrolled" style="position: static; height: 75px; border-bottom: 1px solid var(--border-glass);">
    <div class="container navbar-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-brain"></i> ImpactAILabs <span style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); border-left: 1px solid var(--border-glass); padding-left: 10px;">Admin Portal</span>
      </a>
      <div>
        <button id="logoutBtn" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.9rem;"><i class="fa-solid fa-right-from-bracket" style="margin-right: 6px;"></i> Log Out</button>
      </div>
    </div>
  </header>

  <!-- Main Dashboard View -->
  <main class="container" style="flex: 1; padding: 40px 24px;">
    
    <div class="fade-in">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px;">
        <div>
          <h1 style="font-size: 2.2rem; font-family: var(--font-heading); background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Student Lead Registrations</h1>
          <p style="color: var(--text-secondary); font-size: 0.95rem; margin-top: 4px;">Review and manage student masterclass applications.</p>
        </div>
        <div>
          <button id="downloadCsvBtn" class="btn btn-primary"><i class="fa-solid fa-file-csv" style="margin-right: 8px;"></i> Export to CSV</button>
        </div>
      </div>

      <!-- Error Alert -->
      <div id="errorAlert" class="glass-panel" style="display: none; padding: 12px; border-color: rgba(239, 68, 68, 0.4); background: rgba(239, 68, 68, 0.05); color: #F87171; font-size: 0.85rem; margin-bottom: 24px;"></div>

      <!-- Search and Filter Bar -->
      <div class="glass-panel" style="padding: 16px 20px; display: flex; align-items: center; gap: 16px;">
        <i class="fa-solid fa-magnifying-glass" style="color: var(--text-secondary);"></i>
        <input type="text" id="searchInput" placeholder="Search by name, email, college, or major..." style="border: none; background: transparent; color: var(--text-primary); font-size: 1rem; width: 100%; outline: none;">
      </div>

      <!-- Leads Data Table Grid -->
      <div class="glass-panel" style="margin-top: 24px; padding: 0; overflow-x: auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width: 60px;">ID</th>
              <th>Full Name</th>
              <th>Email Address</th>
              <th>Phone Number</th>
              <th>College / University</th>
              <th>Academic Year</th>
              <th>Major / Study Field</th>
              <th>Registration Time</th>
            </tr>
          </thead>
          <tbody id="leadsTableBody">
            <!-- Data loaded dynamically via report.js -->
            <tr>
              <td colspan="8" style="text-align: center; color: var(--text-secondary); padding: 30px;">
                <i class="fa-solid fa-spinner fa-spin" style="margin-right: 8px;"></i> Loading student registration records...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      
    </div>

  </main>

  <script src="js/report.js"></script>
</body>
</html>
